/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    alias libs.plugins.orgSpringframeworkBoot
    alias libs.plugins.ioSpringDependencyManagement
}

bootJar {
	enabled = true
}

jar {
	enabled = false
}

tasks.withType(JavaCompile) {
    options.annotationProcessorPath = configurations.annotationProcessor
    options.compilerArgs += ['-parameters']
}

dependencies {
    /**
     * 모든 dependencies 는 abc 순으로 정렬
     */
    implementation project(':cjfw-wms-core')
    implementation project(':cjfw-wms-com')

    implementation libs.jasyptSpringBootStarter
    implementation libs.mybatisSpringBootStarter
    implementation libs.ojdbc11
    implementation libs.springBootStarterBatch
    implementation libs.quartz
    implementation libs.springBootStarterQuartz
    implementation libs.c3p0

    //JsonIgnore, Schema
    implementation libs.springdocOpenapiWebMvcUi
    implementation libs.jakartaXmlWsApi
    implementation libs.comSunXmlWs
    implementation libs.springBootStarterWebflux
    implementation libs.jacksonDataformatXml
    
    implementation files('lib/com/ADSClient-1.1.jar')

    compileOnly libs.lombok
    annotationProcessor libs.lombok

    // TestCase
    testImplementation libs.springBootStarterTest
    testCompileOnly libs.lombok
    testAnnotationProcessor libs.lombok
}

description = 'cjfw-wms-batch'

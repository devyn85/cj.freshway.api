/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    alias libs.plugins.orgSpringframeworkBoot
    alias libs.plugins.ioSpringDependencyManagement
}

bootJar {
    enabled = false
}

jar {
    enabled = true
}

tasks.withType(JavaCompile) {
    options.annotationProcessorPath = configurations.annotationProcessor
    options.compilerArgs += ['-parameters']
}

dependencies {
    /**
     * 모든 dependencies 는 abc 순으로 정렬
     */
    implementation libs.commonsFileupload
    implementation libs.commonsIo
    implementation libs.commonsLang3
    implementation libs.gson
    implementation libs.jacksonCore
    implementation libs.jacksonDatabind
    implementation libs.jasyptSpringBootStarter
    implementation libs.jjwt
    implementation libs.lucyXssServlet
    implementation libs.lz4
    implementation libs.mail
    implementation libs.modelmapper
    implementation libs.mybatisSpringBootStarter
    implementation libs.ojdbc11
    implementation libs.openfeign
    implementation libs.pagehelperSpringBootStarter
    implementation libs.poi
    implementation libs.poiooxml
    implementation libs.servletApi
    implementation libs.springBootStarterAop
    implementation libs.springBootStarterSecurity
    implementation libs.springBootStarterWeb
    implementation libs.springdocOpenapiCommon
    implementation libs.springdocOpenapiWebMvcUi
    implementation libs.springSecurityCore
    implementation libs.springBootStarterRedis

    implementation files('lib/com/fasoo/adk/fasoo-jni/3.9.1_1.4/fasoo-jni-3.9.1_1.4.jar')
    implementation files('lib/com/fasoo/adk/FCW_FIPS_JCRYPTO/2.1.2.1/FCW_FIPS_JCRYPTO-2.1.2.1.jar')
    implementation files('lib/com/fasoo/adk/fcwpkg_jni/1.9.1_1.4/fcwpkg_jni-1.9.1_1.4.jar')
    implementation files('lib/com/httpclient-4.2.1.jar')
    implementation files('lib/com/httpcore-4.2.2.jar')
    implementation files('lib/com/httpmime-4.2.5.jar')
    api files('lib/com/json_simple-1.1.jar')
    api files('lib/com/sapjco3.jar')
    implementation files('lib/com/penta/scpdb.jar')
    api files('lib/com/json-lib-2.4-jdk15.jar')
    api files('lib/com/jettison-1.5.4.jar')
    api files('lib/com/nets-nsso-agent-core-jakarta.jar')
    
    /**
     * ApiClient 호출을 위한 라이브러리 추가
     */
    implementation files('lib/com/commons-lang-2.6.jar')
    implementation files('lib/com/ezmorph-1.0.6.jar')
    implementation files('lib/com/commons-collections-3.2.2.jar')
    implementation files('lib/com/commons-beanutils-1.11.0.jar')

    compileOnly libs.lombok
    compileOnly libs.servletApi
    
    annotationProcessor libs.lombok

    runtimeOnly libs.jjwtImpl
    runtimeOnly libs.jjwtJackson
}



description = 'cjfw-wms-core'

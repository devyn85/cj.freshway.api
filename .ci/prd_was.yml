# PRD 배포 파이프라인 구성
# deployinfo.md 기준:WAS #1(pwaylo1), WAS #2(pwaylo2) 각각 2개 인스턴스

# PRD 배포 Stage 정의
stages:
  - WAS

# ===========================================
# WAS 배포 (4개 인스턴스 병렬 배포)
# ===========================================
prd-was:deploy:
  stage: WAS
  needs:
    - job: build
  variables:
    GIT_STRATEGY: none
  before_script:
    - !reference [.ssh_helper, script]
  resource_group: "PRD_WAS_DEPLOY"
  parallel:
    matrix:
      - SERVER_NAME: "pwaylo11"
        DEPLOY_IP: "${PRD_WAS_IP_01}"
        DEPLOY_USER: "${PRD_WAS_USER_01}"
        DEPLOY_RSA: "${PRD_WAS_ID_RSA_01}"        
        DEPLOY_PATH: "/app/deploy/pwaylo1"
        DEPLOY_APP: "pwaylo1"        
      - SERVER_NAME: "pwaylo12"
        DEPLOY_IP: "${PRD_WAS_IP_01}"
        DEPLOY_USER: "${PRD_WAS_USER_01}"
        DEPLOY_RSA: "${PRD_WAS_ID_RSA_01}"
        DEPLOY_PATH: "/app/deploy/pwaylo2"
        DEPLOY_APP: "pwaylo2"              
      - SERVER_NAME: "pwaylo21"
        DEPLOY_IP: "${PRD_WAS_IP_02}"
        DEPLOY_USER: "${PRD_WAS_USER_02}"
        DEPLOY_RSA: "${PRD_WAS_ID_RSA_02}"
        DEPLOY_PATH: "/app/deploy/pwaylo1"
        DEPLOY_APP: "pwaylo1"
      - SERVER_NAME: "pwaylo22"
        DEPLOY_IP: "${PRD_WAS_IP_02}"
        DEPLOY_USER: "${PRD_WAS_USER_02}"
        DEPLOY_RSA: "${PRD_WAS_ID_RSA_02}"
        DEPLOY_PATH: "/app/deploy/pwaylo2"
        DEPLOY_APP: "pwaylo2"

  script:
    - ssh_init "$DEPLOY_RSA" "$DEPLOY_IP"
    
    # Shutdown
    - echo "=========================================="
    - echo "🛑 [${SERVER_NAME}] 애플리케이션 종료"
    - echo "Server:${DEPLOY_IP} → ${DEPLOY_PATH}"
    - echo "=========================================="
    - ssh_run "$DEPLOY_USER" "$DEPLOY_IP" "source ~/.bash_profile && /app/scripts/${DEPLOY_APP}/shutdown.sh"
    - echo "⏳ Waiting for graceful shutdown..."
    - ssh_run "$DEPLOY_USER" "$DEPLOY_IP" "sleep 3"
    - echo "✅ [${SERVER_NAME}] Shutdown 완료"
    
    # Deploy
    - echo "=========================================="
    - echo "📦 [${SERVER_NAME}] 파일 배포"
    - echo "=========================================="
    - scp_run "$DEPLOY_USER" "$DEPLOY_IP" "-rp ./cjfw-wms-api/build/libs/*.jar" "$DEPLOY_PATH/"
    - ssh_run "$DEPLOY_USER" "$DEPLOY_IP" "ls -al $DEPLOY_PATH/*.jar"
    - echo "✅ [${SERVER_NAME}] 파일 배포 완료"
    
    # Start
    - echo "=========================================="
    - echo "🔄 [${SERVER_NAME}] 애플리케이션 시작"
    - echo "=========================================="
    - ssh_run "$DEPLOY_USER" "$DEPLOY_IP" "source ~/.bash_profile && /app/scripts/${DEPLOY_APP}/restart.sh"
    - echo "⏳ Waiting for startup..."
    - ssh_run "$DEPLOY_USER" "$DEPLOY_IP" "sleep 5"
    - ssh_run "$DEPLOY_USER" "$DEPLOY_IP" "ps -ef | grep ${SERVER_NAME} | grep -v grep || echo 'Process check required'"
    - echo "✅ [${SERVER_NAME}] 배포 완료"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"  || $CI_COMMIT_BRANCH == "feature/cicd"'
      when: manual